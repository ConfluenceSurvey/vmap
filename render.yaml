# Render Blueprint - https://render.com/docs/blueprint-spec
services:
  - type: web
    name: vmap
    runtime: python
    buildCommand: pip install -r requirements.txt
    # --timeout 300: Overpass queries can take 1-2+ min; the default 30s worker
    # timeout would kill the worker mid-request (generic 500). --threads 8 keeps
    # one slow export from blocking the homepage / other users.
    startCommand: gunicorn vmap.server:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 300
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
    # Optional: Add disk for persistent output storage
    # disk:
    #   name: vmap-output
    #   mountPath: /opt/render/project/src/output
    #   sizeGB: 1
